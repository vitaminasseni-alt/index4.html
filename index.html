<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Widen Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #f0f0f0;
    font-family: 'Montserrat', sans-serif;
    user-select: none;
  }

  .topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: #ffffff;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
  }

  .logo-img {
    height: 34px;
    width: auto;
    filter: invert(1);
  }

  .grid {
    position: absolute;
    top: 60px; left: 0; right: 0; bottom: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr 90px;
    gap: 8px;
    background: #f0f0f0;
    padding: 8px;
  }

  .tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-decoration: none;
    background: #ffffff;
    border-radius: 16px;
    transition: background 0.2s;
    cursor: pointer;
    border: none;
    width: 100%;
  }

  .tile.pressed { background: #021e2c; }

  .tile-feedback {
    grid-column: 1 / -1;
    flex-direction: row;
    gap: 16px;
    background: #021e2c;
    border-radius: 16px;
  }

  .tile-feedback:active { background: #0d2b3e; }

  .icon-wrap {
    width: 68px; height: 68px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .tile-1 .icon-wrap { background: #eef2f6; }
  .tile-2 .icon-wrap { background: #eef4ee; }
  .tile-3 .icon-wrap { background: #eef2f6; }
  .tile-4 .icon-wrap { background: #eef4ee; }
  .tile.pressed .icon-wrap { background: rgba(255,255,255,0.1); }

  .icon-wrap svg {
    width: 32px; height: 32px;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    transition: stroke 0.2s;
  }

  .tile-1 .icon-wrap svg { stroke: #2f5c7e; }
  .tile-2 .icon-wrap svg { stroke: #3b663c; }
  .tile-3 .icon-wrap svg { stroke: #2f5c7e; }
  .tile-4 .icon-wrap svg { stroke: #3b663c; }
  .tile.pressed .icon-wrap svg { stroke: #ffffff; }

  .tile-label {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #021e2c;
    transition: color 0.2s;
  }

  .tile.pressed .tile-label { color: #ffffff; }
  .tile-feedback .tile-label { color: #ffffff; font-size: 15px; }

  .tile-sub {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #666;
    margin-top: -6px;
    text-align: center;
    padding: 0 16px;
    transition: color 0.2s;
  }

  .tile.pressed .tile-sub { color: rgba(255,255,255,0.5); }
  .tile-feedback .tile-sub { color: rgba(255,255,255,0.5); margin-top: 0; padding: 0; }

  .feedback-icon {
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.12);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .feedback-icon svg {
    width: 26px; height: 26px;
    fill: #71a56c;
    stroke: none;
  }

  /* POPUP */
  .popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .popup-overlay.open { display: flex; }

  .popup {
    background: #ffffff;
    border-radius: 28px;
    padding: 40px 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 360px;
  }

  .popup-title {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #021e2c;
    text-align: center;
  }

  .popup-sub {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #aaaaaa;
    margin-top: -12px;
    text-align: center;
  }

  #qrcode {
    padding: 12px;
    background: #fff;
    border: 1px solid #f0f0f0;
    border-radius: 12px;
  }

  #qrcode img, #qrcode canvas {
    display: block;
    border-radius: 4px;
  }

  .popup-hint {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #bbbbbb;
    text-align: center;
  }

  .popup-close {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #aaaaaa;
    cursor: pointer;
    padding: 8px 20px;
    border: 1px solid #e8e8e8;
    border-radius: 20px;
  }
</style>
</head>

    tile.addEventListener('mousedown', () => tile.classList.add('pressed'));
    tile.addEventListener('mouseup', () => setTimeout(() => tile.classList.remove('pressed'), 300));
    tile.addEventListener('mouseleave', () => tile.classList.remove('pressed'));
  });

  // QR code
  var qrGenerated = false;

  function openPopup() {
    document.getElementById('popupOverlay').classList.add('open');
    if (!qrGenerated) {
      new QRCode(document.getElementById('qrcode'), {
        text: 'https://g.page/r/CbgAWG3ICoYqEBM/review',
        width: 200,
        height: 200,
        colorDark: '#021e2c',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
      qrGenerated = true;
    }
  }

  function closePopup() {
    document.getElementById('popupOverlay').classList.remove('open');
  }
</script>
